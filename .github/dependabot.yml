version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "kornsour"
    labels:
      - "dependencies"
    groups:
      next:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      biome:
        patterns:
          - "@biomejs/*"
      vitest:
        patterns:
          - "vitest"
          - "@vitejs/*"
      playwright:
        patterns:
          - "@playwright/*"
      zod:
        patterns:
          - "zod"
          - "@t3-oss/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
